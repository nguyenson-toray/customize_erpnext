<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Generator</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
	background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
	min-height: 100vh;
	display: flex;
	align-items: flex-start;
	justify-content: center;
	padding: 24px;
}

/* ── Wrapper ── */
.wrapper {
	background: #fff;
	border-radius: 16px;
	box-shadow: 0 4px 32px rgba(0,0,0,.12);
	display: flex;
	width: 100%;
	max-width: 1080px;
	overflow: hidden;
	min-height: 560px;
}

/* ── Left panel ── */
.panel-left {
	width: 360px;
	flex-shrink: 0;
	padding: 32px;
	display: flex;
	flex-direction: column;
	border-right: 1px solid #eef0f2;
}

.panel-left h1 {
	font-size: 19px;
	color: #1a1a2e;
	margin-bottom: 24px;
	display: flex;
	align-items: center;
	gap: 10px;
}

.icon-box {
	width: 32px; height: 32px;
	background: #1a5276;
	border-radius: 8px;
	display: flex; align-items: center; justify-content: center;
	flex-shrink: 0;
}
.icon-box svg { width: 18px; height: 18px; fill: #fff; }

/* ── Form elements ── */
.form-group { margin-bottom: 16px; }

.lbl {
	display: block;
	font-size: 11px;
	font-weight: 700;
	color: #6c757d;
	text-transform: uppercase;
	letter-spacing: .6px;
	margin-bottom: 6px;
}

select, input[type="number"] {
	width: 100%;
	padding: 9px 12px;
	border: 1.5px solid #dee2e6;
	border-radius: 8px;
	font-size: 13px;
	background: #fff;
	font-family: inherit;
	transition: border-color .2s, box-shadow .2s;
}
select:focus, input[type="number"]:focus {
	outline: none;
	border-color: #1a5276;
	box-shadow: 0 0 0 3px rgba(26,82,118,.1);
}

/* ── Type info card ── */
.type-info {
	margin-top: 8px;
	padding: 10px 12px;
	background: #f0f4f8;
	border-left: 3px solid #1a5276;
	border-radius: 0 8px 8px 0;
	font-size: 11.5px;
	color: #495057;
	line-height: 1.55;
}
.type-info .ti-row { display: flex; gap: 6px; margin-bottom: 2px; }
.type-info .ti-k { font-weight: 700; color: #1a5276; min-width: 64px; flex-shrink: 0; }
.type-info .ti-note { margin-top: 5px; color: #868e96; font-style: italic; }

/* ── Content textarea ── */
.lbl-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.lbl-row .lbl { margin-bottom: 0; }

.badge {
	font-size: 11px; font-weight: 700;
	background: #e3f0fb; color: #1a5276;
	padding: 2px 9px; border-radius: 10px;
}

textarea {
	width: 100%;
	padding: 10px 12px;
	border: 1.5px solid #dee2e6;
	border-radius: 8px;
	font-size: 13px;
	font-family: inherit;
	resize: vertical;
	min-height: 108px;
	max-height: 200px;
	line-height: 1.5;
	transition: border-color .2s, box-shadow .2s;
}
textarea:focus { outline: none; border-color: #1a5276; box-shadow: 0 0 0 3px rgba(26,82,118,.1); }

.hint {
	font-size: 11px; color: #adb5bd; margin-top: 4px;
	display: flex; align-items: center; gap: 4px;
}
.hint::before { content: 'ℹ'; }

/* ── Options row ── */
.opts-row { display: flex; gap: 12px; align-items: flex-end; }
.opts-row .field { flex: 1; }

.toggle-wrap { display: flex; align-items: flex-end; padding-bottom: 2px; }
.toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.toggle input { display: none; }
.toggle .sw {
	display: inline-block; width: 38px; height: 20px;
	background: #ced4da; border-radius: 10px;
	position: relative; transition: background .2s; flex-shrink: 0;
}
.toggle .sw::after {
	content: ''; width: 14px; height: 14px; background: #fff;
	border-radius: 50%; position: absolute; top: 3px; left: 3px;
	transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle input:checked + .sw { background: #1a5276; }
.toggle input:checked + .sw::after { transform: translateX(18px); }
.toggle .sw-text { font-size: 12px; font-weight: 600; color: #495057; }

/* ── Generate button ── */
.btn-gen {
	width: 100%; margin-top: auto; padding: 12px;
	background: #1a5276; color: #fff; border: none;
	border-radius: 8px; font-size: 14px; font-weight: 700;
	cursor: pointer; transition: background .2s, transform .1s; letter-spacing: .3px;
}
.btn-gen:hover { background: #154360; }
.btn-gen:active { transform: scale(.98); }
.btn-gen:disabled { background: #adb5bd; cursor: not-allowed; transform: none; }

/* ── Right panel ── */
.panel-right {
	flex: 1; background: #f8f9fb;
	display: flex; flex-direction: column;
	align-items: center; justify-content: center;
	padding: 32px; min-width: 0;
}

.placeholder { text-align: center; color: #adb5bd; }
.placeholder svg { width: 72px; height: 72px; fill: #dee2e6; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
.placeholder p { font-size: 13px; }

/* ── Single result ── */
.result-single { display: none; text-align: center; width: 100%; max-width: 300px; }
.result-single img {
	width: 100%; border-radius: 10px;
	border: 1px solid #e9ecef; box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.btn-dl {
	display: inline-block; margin-top: 14px; padding: 10px 32px;
	background: #27ae60; color: #fff; border: none;
	border-radius: 8px; font-size: 13px; font-weight: 700;
	cursor: pointer; text-decoration: none; transition: background .2s;
}
.btn-dl:hover { background: #219a52; color: #fff; }

/* ── Batch result ── */
.result-batch { display: none; flex-direction: column; width: 100%; }

.batch-head {
	display: flex; align-items: center; justify-content: space-between;
	margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.batch-summary { font-size: 13px; font-weight: 600; color: #495057; }
.cnt-ok { color: #27ae60; }
.cnt-err { color: #e74c3c; }

.btn-zip {
	padding: 9px 20px; background: #27ae60; color: #fff; border: none;
	border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
	transition: background .2s; white-space: nowrap;
}
.btn-zip:hover { background: #219a52; }
.btn-zip:disabled { background: #adb5bd; cursor: not-allowed; }

.batch-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
	gap: 12px;
	max-height: 480px;
	overflow-y: auto;
	padding-right: 2px;
}

.b-card {
	background: #fff; border: 1px solid #e9ecef; border-radius: 10px;
	padding: 12px; display: flex; flex-direction: column;
	align-items: center; gap: 8px; transition: box-shadow .2s;
}
.b-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.b-card.err { border-color: #f5c6cb; background: #fff5f5; }
.b-card img { width: 100%; border-radius: 6px; border: 1px solid #f0f0f0; }
.b-card .c-lbl {
	font-size: 11px; color: #6c757d; text-align: center;
	word-break: break-all; max-height: 32px; overflow: hidden; line-height: 1.4;
}
.b-card .c-err { font-size: 11px; color: #e74c3c; text-align: center; line-height: 1.4; }
.btn-item-dl {
	width: 100%; padding: 5px 0; background: #1a5276; color: #fff;
	border: none; border-radius: 6px; font-size: 11px; font-weight: 700;
	cursor: pointer; text-decoration: none; text-align: center;
	display: block; transition: background .2s;
}
.btn-item-dl:hover { background: #154360; color: #fff; }

/* ── Tabs ── */
.tab-bar {
	display: flex; gap: 4px; margin-bottom: 18px;
	background: #f0f4f8; border-radius: 10px; padding: 4px;
}
.tab-btn {
	flex: 1; padding: 7px 0; font-size: 12px; font-weight: 700;
	background: transparent; border: none; border-radius: 7px;
	cursor: pointer; color: #6c757d; transition: all .2s; letter-spacing: .2px;
}
.tab-btn.active { background: #fff; color: #1a5276; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
.tab-pane { display: none; flex-direction: column; flex: 1; }
.tab-pane.active { display: flex; }

/* ── Excel dropzone ── */
.dropzone {
	border: 2px dashed #dee2e6; border-radius: 10px; padding: 22px 14px;
	text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
	background: #fafbfc; position: relative;
}
.dropzone:hover, .dropzone.over { border-color: #1a5276; background: #f0f4f8; }
.dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.dz-icon { font-size: 28px; margin-bottom: 6px; display: block; }
.dz-text { font-size: 13px; font-weight: 600; color: #495057; }
.dz-sub  { font-size: 11px; color: #adb5bd; margin-top: 3px; }
.dz-file { margin-top: 8px; font-size: 12px; color: #1a5276; font-weight: 600; display: none; }

.xl-opts { display: flex; gap: 10px; align-items: flex-end; }
.xl-opts .field { flex: 1; }
.chk-wrap {
	display: flex; align-items: center; gap: 7px;
	padding: 9px 12px; background: #f8f9fb;
	border: 1.5px solid #dee2e6; border-radius: 8px; cursor: pointer;
}
.chk-wrap input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: #1a5276; }
.chk-wrap span { font-size: 12px; font-weight: 600; color: #495057; }

.xl-result {
	display: none; margin-top: 12px; padding: 10px 14px;
	border-radius: 8px; font-size: 12px; font-weight: 600;
}
.xl-result.ok  { background: #d4edda; color: #155724; }
.xl-result.err { background: #f8d7da; color: #721c24; }

/* ── Responsive ── */
@media (max-width: 780px) {
	.wrapper { flex-direction: column; }
	.panel-left { width: 100%; border-right: none; border-bottom: 1px solid #eef0f2; }
	.panel-right { justify-content: flex-start; }
}
@media (max-width: 480px) {
	body { padding: 12px; }
	.panel-left, .panel-right { padding: 20px; }
	.batch-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>
<body>
<script>window.csrf_token = "{{ frappe.session.csrf_token }}";</script>

<div class="wrapper">

	<!-- ── Left panel ── -->
	<div class="panel-left">
		<h1>
			<span class="icon-box">
				<svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V3H3v4zm4 12h2v-4H7v4zm0-8h2V9H7v2zm-4 4h2v-4H3v4zm0 4h2v-2H3v2zm4-16h2V3H7v0zm12 12h2v-4h-2v4zm-8-8h2V3h-2v4zm8-2V3h-2v4h2zM7 7h2V3H7v4zm8 4h2V9h-2v2zm4 4h2v-2h-2v2zm0 4h2v-2h-2v2zm-4 0h2v-4h-2v4zm0-12h2V3h-2v4zm-4 12h2v-4h-2v4zm0-8h2V9h-2v2z"/></svg>
			</span>
			Barcode Generator
		</h1>

		<!-- Type selector -->
		<div class="form-group">
			<label class="lbl" for="barcodeType">Barcode Type</label>
			<select id="barcodeType" onchange="onTypeChange()">
				<option value="qr">QR Code</option>
				<option value="code128">Code 128</option>
				<option value="code39">Code 39</option>
				<option value="ean13">EAN-13</option>
				<option value="ean8">EAN-8</option>
				<option value="upca">UPC-A</option>
				<option value="itf14">ITF-14</option>
			</select>
			<div id="typeInfo" class="type-info"></div>
		</div>

		<!-- Tab bar -->
		<div class="tab-bar">
			<button class="tab-btn active" id="tabBtnManual" onclick="switchTab('manual')">Manual</button>
			<button class="tab-btn"        id="tabBtnExcel"  onclick="switchTab('excel')">Excel Upload</button>
		</div>

		<!-- ── Tab: Manual ── -->
		<div class="tab-pane active" id="tabManual">
			<div class="form-group">
				<div class="lbl-row">
					<span class="lbl">Content</span>
					<span class="badge" id="lineBadge" style="display:none">1 item</span>
				</div>
				<textarea id="content" rows="5"></textarea>
				<div class="hint" id="batchHint" style="display:none">Each line = 1 barcode &nbsp;·&nbsp; Ctrl+Enter to generate</div>
				<div class="hint" id="qrHint">Ctrl+Enter to generate</div>
			</div>
			<div class="form-group">
				<div class="opts-row">
					<div class="field">
						<label class="lbl" for="size">Width (px)</label>
						<input type="number" id="size" value="500" min="100" max="2000" step="50">
					</div>
					<div id="logoWrap" class="toggle-wrap">
						<label class="toggle">
							<input type="checkbox" id="logo" checked>
							<span class="sw"></span>
							<span class="sw-text">Logo</span>
						</label>
					</div>
					<div id="showTextWrap" class="toggle-wrap" style="display:none">
						<label class="toggle">
							<input type="checkbox" id="showText" checked>
							<span class="sw"></span>
							<span class="sw-text">Text</span>
						</label>
					</div>
				</div>
			</div>
			<button class="btn-gen" id="btnGen" onclick="generate()">Generate</button>
		</div>

		<!-- ── Tab: Excel Upload ── -->
		<div class="tab-pane" id="tabExcel">
			<div class="form-group">
				<label class="lbl">Excel File (.xlsx)</label>
				<div class="dropzone" id="dropzone"
					ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event)">
					<input type="file" id="xlFile" accept=".xlsx,.xls"
						onchange="onFileSelect(this.files[0])">
					<span class="dz-icon">📂</span>
					<div class="dz-text">Click to select or drag &amp; drop</div>
					<div class="dz-sub">.xlsx / .xls — column A = barcode values</div>
					<div class="dz-file" id="dzFile"></div>
				</div>
			</div>
			<div class="form-group">
				<div class="xl-opts">
					<div class="field">
						<label class="lbl" for="xlImgWidth">Image width (px)</label>
						<input type="number" id="xlImgWidth" value="200" min="60" max="600" step="20">
					</div>
					<div class="field" style="display:flex;flex-direction:column;gap:6px">
						<label class="lbl" style="margin-bottom:0">Options</label>
						<label class="chk-wrap">
							<input type="checkbox" id="xlHasHeader" checked>
							<span>First row is header</span>
						</label>
						<label class="chk-wrap" id="xlShowTextWrap">
							<input type="checkbox" id="xlShowText" checked>
							<span>Show text below barcode</span>
						</label>
					</div>
				</div>
			</div>
			<div id="xlLogoWrap" class="form-group" style="display:none">
				<div class="toggle-wrap">
					<label class="toggle">
						<input type="checkbox" id="xlLogo" checked>
						<span class="sw"></span>
						<span class="sw-text">Embed logo (QR)</span>
					</label>
				</div>
			</div>
			<div class="xl-result" id="xlResult"></div>
			<button class="btn-gen" id="btnXl" onclick="generateExcel()" style="margin-top:auto">
				Generate &amp; Download Excel
			</button>
		</div>
	</div>

	<!-- ── Right panel ── -->
	<div class="panel-right">
		<div class="placeholder" id="placeholder">
			<svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V3H3v4zm4 12h2v-4H7v4zm0-8h2V9H7v2zm-4 4h2v-4H3v4zm0 4h2v-2H3v2zm4-16h2V3H7v0zm12 12h2v-4h-2v4zm-8-8h2V3h-2v4zm8-2V3h-2v4h2zM7 7h2V3H7v4zm8 4h2V9h-2v2zm4 4h2v-2h-2v2zm0 4h2v-2h-2v2zm-4 0h2v-4h-2v4zm0-12h2V3h-2v4zm-4 12h2v-4h-2v4zm0-8h2V9h-2v2z"/></svg>
			<p>Barcode will appear here</p>
		</div>

		<div class="result-single" id="resultSingle">
			<img id="bcImage" alt="Barcode">
			<br>
			<a class="btn-dl" id="btnDl" download="barcode.png">Download PNG</a>
		</div>

		<div class="result-batch" id="resultBatch">
			<div class="batch-head">
				<div class="batch-summary" id="batchSummary"></div>
				<button class="btn-zip" id="btnZip" onclick="downloadZip()">⬇ Download All (ZIP)</button>
			</div>
			<div class="batch-grid" id="batchGrid"></div>
		</div>
	</div>

</div>

<!-- JsBarcode for 1D barcodes (client-side, no API call) -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js" crossorigin="anonymous"></script>
<!-- JSZip for batch ZIP download -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>

<script>
// ── Type definitions ──────────────────────────────────────────────────────────
const TYPES = {
	qr: {
		label: 'QR Code',
		max: '~4296 alphanumeric / ~2953 bytes',
		charset: 'Text, URL, binary, Unicode',
		uses: 'URL, vCard, WiFi, payment links',
		note: 'Supports logo overlay. Rendered server-side.',
		jsbarcode: null,   // backend only
		placeholder: 'https://example.com',
	},
	code128: {
		label: 'Code 128',
		max: '~80 chars (practical)',
		charset: 'All ASCII characters (0–127)',
		uses: 'Shipping, logistics, inventory management',
		note: 'High-density. Auto-selects best encoding (A/B/C).',
		jsbarcode: 'CODE128',
		placeholder: 'INV-2024-001\nSHP-987654321\nWH-ZONE-A',
	},
	code39: {
		label: 'Code 39',
		max: '~20–30 chars (practical)',
		charset: 'A–Z, 0–9, space, – . $ / + %',
		uses: 'Inventory, ID cards, manufacturing',
		note: 'Uppercase only (auto-converted). Self-checking barcode.',
		jsbarcode: 'CODE39',
		placeholder: 'ITEM-001\nWAREHOUSE-A\nEMP-0042',
	},
	ean13: {
		label: 'EAN-13',
		max: 'Exactly 12 digits (13th is checksum)',
		charset: 'Digits 0–9 only',
		uses: 'Retail product packaging — international standard',
		note: 'GS1 standard. Enter 12 digits; checksum auto-added.',
		jsbarcode: 'EAN13',
		placeholder: '590123412345\n401234123456',
	},
	ean8: {
		label: 'EAN-8',
		max: 'Exactly 7 digits (8th is checksum)',
		charset: 'Digits 0–9 only',
		uses: 'Small retail products with limited label space',
		note: 'Compact version of EAN-13. Enter 7 digits.',
		jsbarcode: 'EAN8',
		placeholder: '9638507\n1234567',
	},
	upca: {
		label: 'UPC-A',
		max: 'Exactly 11 digits (12th is checksum)',
		charset: 'Digits 0–9 only',
		uses: 'North American retail — grocery & consumer products',
		note: 'US/Canada standard. Enter 11 digits; checksum auto-added.',
		jsbarcode: 'UPC',
		placeholder: '03600029145\n01234567890',
	},
	itf14: {
		label: 'ITF-14',
		max: 'Exactly 13 digits (14th is checksum)',
		charset: 'Digits 0–9 only',
		uses: 'Shipping containers, outer packaging, GTIN-14',
		note: 'Interleaved 2-of-5 with bearer bars. Enter 13 digits.',
		jsbarcode: 'ITF14',
		placeholder: '1234567890128\n9501234567890',
	},
};

let lastResults = [];

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
	onTypeChange();
	document.getElementById('content').addEventListener('input', updateBadge);
	document.getElementById('content').addEventListener('keydown', e => {
		if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); generate(); }
	});
	updateBadge();
});

function onTypeChange() {
	const type = document.getElementById('barcodeType').value;
	const t = TYPES[type];
	const isQr = type === 'qr';

	document.getElementById('typeInfo').innerHTML =
		`<div class="ti-row"><span class="ti-k">Max:</span><span>${t.max}</span></div>` +
		`<div class="ti-row"><span class="ti-k">Charset:</span><span>${t.charset}</span></div>` +
		`<div class="ti-row"><span class="ti-k">Used for:</span><span>${t.uses}</span></div>` +
		`<div class="ti-note">${t.note}</div>`;

	document.getElementById('logoWrap').style.display        = isQr ? '' : 'none';
	document.getElementById('xlLogoWrap').style.display      = isQr ? '' : 'none';
	document.getElementById('showTextWrap').style.display    = isQr ? 'none' : '';
	document.getElementById('xlShowTextWrap').style.display  = isQr ? 'none' : '';
	document.getElementById('lineBadge').style.display       = isQr ? 'none' : '';
	document.getElementById('batchHint').style.display       = isQr ? 'none' : '';
	document.getElementById('qrHint').style.display          = isQr ? '' : 'none';
	document.getElementById('content').placeholder     = isQr
		? t.placeholder
		: t.placeholder + '\n\n(each line = 1 barcode)';

	updateBadge();
}

function updateBadge() {
	const type = document.getElementById('barcodeType').value;
	if (type === 'qr') return;
	const n = getLines().length;
	document.getElementById('lineBadge').textContent = n === 1 ? '1 item' : n + ' items';
}

function getLines() {
	// For 1D barcodes: each non-empty line is one item.
	// (Not used for QR — generate() reads the full textarea value instead.)
	return document.getElementById('content').value
		.split('\n').map(l => l.trim()).filter(l => l.length > 0);
}

// ── API call (used for QR only) ───────────────────────────────────────────────
async function callApi(method, args) {
	const fd = new FormData();
	fd.append('csrf_token', window.csrf_token);
	for (const [k, v] of Object.entries(args)) fd.append(k, v == null ? '' : String(v));
	const res = await fetch(`/api/method/${method}`, { method: 'POST', credentials: 'same-origin', body: fd });
	if (res.status === 403) { location.reload(); throw new Error('Session expired'); }
	const data = await res.json();
	if (data.exc) {
		let msg = '';
		try { msg = JSON.parse(JSON.parse(data._server_messages || '[]')[0]).message; } catch {}
		throw new Error(msg || data.exc_type || 'Server error');
	}
	return data.message;
}

// ── 1D barcode via JsBarcode (client-side) ────────────────────────────────────
function renderLinear(format, content, targetWidth, showText = true) {
	const canvas = document.createElement('canvas');
	let errMsg = null;
	try {
		JsBarcode(canvas, content, {
			format,
			width: 2,
			height: 80,
			displayValue: showText,
			fontSize: 14,
			margin: 10,
			valid: v => { if (!v) errMsg = `"${content}" is not valid for ${format}`; }
		});
	} catch (e) {
		return { content, b64: null, error: e.message };
	}
	if (errMsg) return { content, b64: null, error: errMsg };

	// Scale to targetWidth
	let src = canvas;
	if (targetWidth && targetWidth !== canvas.width) {
		const sc = document.createElement('canvas');
		sc.width = targetWidth;
		sc.height = Math.max(1, Math.round(canvas.height * targetWidth / canvas.width));
		sc.getContext('2d').drawImage(canvas, 0, 0, sc.width, sc.height);
		src = sc;
	}
	return { content, b64: src.toDataURL('image/png').split(',')[1], error: null };
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
	const type     = document.getElementById('barcodeType').value;
	const size     = parseInt(document.getElementById('size').value) || 500;
	const useLogo  = document.getElementById('logo').checked ? 1 : 0;
	const showText = document.getElementById('showText').checked;
	const t        = TYPES[type];

	// QR: entire textarea = one QR value (may contain newlines)
	// 1D: each non-empty line = one barcode (batch)
	const isQr = type === 'qr';
	const items = isQr
		? [document.getElementById('content').value]
		: getLines();

	if (!items[0]) { alert('Please enter content'); return; }

	const btn = document.getElementById('btnGen');
	btn.disabled = true;
	btn.textContent = items.length > 1 ? `Generating ${items.length}…` : 'Generating…';

	try {
		let results;
		if (t.jsbarcode) {
			// 1D — client-side via JsBarcode, instant
			const fmt = t.jsbarcode;
			const normalized = type === 'code39' ? items.map(l => l.toUpperCase()) : items;
			results = normalized.map(l => renderLinear(fmt, l, size, showText));
		} else {
			// QR — backend (supports logo overlay, error correction)
			results = await callApi(
				'customize_erpnext.api.qr_code.generate_barcode',
				{ barcode_type: 'qr', contents: JSON.stringify(items), size, use_logo: useLogo }
			);
		}
		lastResults = results;
		showResults(results);
	} catch (e) {
		alert('Error: ' + e.message);
	} finally {
		btn.disabled = false;
		btn.textContent = 'Generate';
	}
}

// ── Display results ───────────────────────────────────────────────────────────
function showResults(results) {
	document.getElementById('placeholder').style.display   = 'none';
	document.getElementById('resultSingle').style.display  = 'none';
	document.getElementById('resultBatch').style.display   = 'none';

	if (results.length === 1) {
		const r = results[0];
		if (r.error) {
			alert('Error: ' + r.error);
			document.getElementById('placeholder').style.display = '';
			return;
		}
		const dataUrl = 'data:image/png;base64,' + r.b64;
		document.getElementById('bcImage').src = dataUrl;
		const dl = document.getElementById('btnDl');
		dl.href = dataUrl;
		dl.download = safeFilename(r.content) + '.png';
		document.getElementById('resultSingle').style.display = 'block';
	} else {
		renderBatch(results);
		document.getElementById('resultBatch').style.display = 'flex';
	}
}

function renderBatch(results) {
	const ok  = results.filter(r => !r.error).length;
	const err = results.filter(r =>  r.error).length;
	let sumHtml = `<span class="cnt-ok">✓ ${ok} generated</span>`;
	if (err) sumHtml += ` &nbsp; <span class="cnt-err">✗ ${err} failed</span>`;
	document.getElementById('batchSummary').innerHTML = sumHtml;
	document.getElementById('btnZip').disabled = ok === 0;

	const grid = document.getElementById('batchGrid');
	grid.innerHTML = '';
	results.forEach(r => {
		const card = document.createElement('div');
		card.className = 'b-card' + (r.error ? ' err' : '');
		if (r.error) {
			card.innerHTML =
				`<div style="font-size:26px;color:#e74c3c">✗</div>` +
				`<div class="c-lbl">${esc(r.content)}</div>` +
				`<div class="c-err">${esc(r.error)}</div>`;
		} else {
			const dataUrl = 'data:image/png;base64,' + r.b64;
			const fname = safeFilename(r.content) + '.png';
			card.innerHTML =
				`<img src="${dataUrl}" alt="barcode">` +
				`<div class="c-lbl">${esc(r.content)}</div>` +
				`<a class="btn-item-dl" href="${dataUrl}" download="${esc(fname)}">↓ Download</a>`;
		}
		grid.appendChild(card);
	});
}

// ── ZIP download ──────────────────────────────────────────────────────────────
async function downloadZip() {
	const btn = document.getElementById('btnZip');
	btn.disabled = true; btn.textContent = 'Zipping…';
	try {
		const zip = new JSZip();
		const seen = {};
		lastResults.filter(r => !r.error).forEach(r => {
			const base = safeFilename(r.content);
			seen[base] = (seen[base] || 0) + 1;
			const fname = base + (seen[base] > 1 ? '_' + seen[base] : '') + '.png';
			zip.file(fname, b64ToBytes(r.b64));
		});
		const blob = await zip.generateAsync({ type: 'blob' });
		const url = URL.createObjectURL(blob);
		Object.assign(document.createElement('a'), { href: url, download: 'barcodes.zip' }).click();
		setTimeout(() => URL.revokeObjectURL(url), 1500);
	} catch (e) {
		alert('ZIP error: ' + e.message);
	} finally {
		btn.disabled = false; btn.textContent = '⬇ Download All (ZIP)';
	}
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
	document.getElementById('tabManual').classList.toggle('active', tab === 'manual');
	document.getElementById('tabExcel').classList.toggle('active',  tab === 'excel');
	document.getElementById('tabBtnManual').classList.toggle('active', tab === 'manual');
	document.getElementById('tabBtnExcel').classList.toggle('active',  tab === 'excel');
	// Reset result panel when switching tabs
	document.getElementById('placeholder').style.display   = '';
	document.getElementById('resultSingle').style.display  = 'none';
	document.getElementById('resultBatch').style.display   = 'none';
}

// ── Excel Upload ──────────────────────────────────────────────────────────────
let xlFile = null;

function onFileSelect(file) {
	if (!file) return;
	xlFile = file;
	const el = document.getElementById('dzFile');
	const kb = (file.size / 1024).toFixed(1);
	el.textContent = `📄 ${file.name}  (${kb} KB)`;
	el.style.display = 'block';
	document.getElementById('xlResult').style.display = 'none';
}

// Drag-and-drop handlers
function dzOver(e)  { e.preventDefault(); document.getElementById('dropzone').classList.add('over'); }
function dzLeave(e) { document.getElementById('dropzone').classList.remove('over'); }
function dzDrop(e)  {
	e.preventDefault();
	document.getElementById('dropzone').classList.remove('over');
	const file = e.dataTransfer.files[0];
	if (file) {
		document.getElementById('xlFile').files; // can't set, just update state
		onFileSelect(file);
		xlFile = file;
	}
}

async function generateExcel() {
	if (!xlFile) { alert('Please select an Excel file first.'); return; }

	const type      = document.getElementById('barcodeType').value;
	const imgWidth  = parseInt(document.getElementById('xlImgWidth').value) || 200;
	const hasHeader = document.getElementById('xlHasHeader').checked ? 1 : 0;
	const useLogo   = document.getElementById('xlLogo').checked ? 1 : 0;
	const showText  = document.getElementById('xlShowText').checked ? 1 : 0;

	const btn = document.getElementById('btnXl');
	btn.disabled = true;
	btn.textContent = 'Processing…';
	document.getElementById('xlResult').style.display = 'none';

	try {
		const fileB64 = await fileToB64(xlFile);
		const res = await callApi('customize_erpnext.api.qr_code.generate_barcode_excel', {
			barcode_type: type,
			file_b64: fileB64,
			has_header: hasHeader,
			img_width: imgWidth,
			use_logo: useLogo,
			show_text: showText,
		});

		// Trigger download
		const bytes = b64ToBytes(res.file_b64);
		const blob  = new Blob([bytes], {
			type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
		});
		const url  = URL.createObjectURL(blob);
		const name = xlFile.name.replace(/\.xlsx?$/i, '') + '_barcodes.xlsx';
		Object.assign(document.createElement('a'), { href: url, download: name }).click();
		setTimeout(() => URL.revokeObjectURL(url), 1500);

		// Show result summary
		const xl = document.getElementById('xlResult');
		if (res.errors) {
			xl.className = 'xl-result err';
			xl.textContent = `✓ ${res.total} barcodes generated · ✗ ${res.errors} errors (see column B in file)`;
		} else {
			xl.className = 'xl-result ok';
			xl.textContent = `✓ ${res.total} barcodes generated successfully`;
		}
		xl.style.display = 'block';

	} catch (e) {
		alert('Error: ' + e.message);
	} finally {
		btn.disabled = false;
		btn.textContent = 'Generate & Download Excel';
	}
}

function fileToB64(file) {
	return new Promise((resolve, reject) => {
		const reader = new FileReader();
		reader.onload  = e => {
			const bytes = new Uint8Array(e.target.result);
			let bin = '';
			for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
			resolve(btoa(bin));
		};
		reader.onerror = reject;
		reader.readAsArrayBuffer(file);
	});
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function safeFilename(s) { return (s || 'barcode').replace(/[^\w\-\.]/g, '_').slice(0, 60); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function b64ToBytes(b64) {
	const bin = atob(b64), out = new Uint8Array(bin.length);
	for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
	return out;
}
